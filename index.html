<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi Art Studio | Makeup Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; -webkit-font-smoothing: antialiased; }
        
        /* 폰트 간격을 0.15em -> 0.05em으로 줄여 가독성을 높였습니다 */
        .studio-logo { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 2.2rem; 
            letter-spacing: 0.05em; 
            text-transform: uppercase; 
            font-weight: 300;
            line-height: 1.2;
            word-spacing: 0.1em;
        }
        
        .hidden { display: none !important; }
        .modal-bg { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); position: fixed; top:0; left:0; width:100%; height:100%; z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 30px; }
        input { border-radius: 0 !important; border-bottom: 1px solid #e5e5e5 !important; background: transparent; transition: border-color 0.3s; width: 100%; padding: 12px 0; font-size: 14px; color: #1a1a1a; }
        input::placeholder { color: #ccc; font-style: italic; }
        input:focus { border-bottom: 1px solid #1a1a1a !important; outline: none; }
        .btn-select { border: 1px solid #f0f0f0; padding: 15px; font-size: 12px; text-align: left; cursor: pointer; transition: 0.2s; margin-bottom: 8px; display: block; width: 100%; }
        .btn-select.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
        .section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; tracking: 0.2em; border-bottom: 1px solid #1a1a1a; display: inline-block; margin-bottom: 24px; }
        .label-text { font-size: 10px; text-transform: uppercase; color: #aaa; letter-spacing: 0.1em; margin-bottom: 6px; display: block; }
    </style>
</head>
<body class="pb-32">

<div id="app" class="max-w-md mx-auto px-8 py-12">
    <!-- Language Selection -->
    <div class="flex justify-end gap-4 mb-16 text-[9px] tracking-widest text-gray-400 font-medium">
        <button onclick="changeLang('en')" class="hover:text-black">EN</button>
        <button onclick="changeLang('ko')" class="hover:text-black">KR</button>
        <button onclick="changeLang('man')" class="hover:text-black">普通话</button>
        <button onclick="changeLang('can')" class="hover:text-black">廣東話</button>
    </div>

    <header class="text-center mb-20">
        <h1 class="studio-logo text-gray-900">Hi Art Studio</h1>
        <p id="sub-title" class="text-[9px] uppercase tracking-[0.4em] text-gray-400 mt-3 italic font-light">Makeup Lesson Request</p>
    </header>

    <div class="space-y-20">
        <!-- 1. Student Info -->
        <section>
            <div class="space-y-10">
                <div>
                    <label id="label-name" class="label-text">Student Name</label>
                    <input type="text" id="student-name" placeholder="e.g. Lan Kim">
                </div>
                <div>
                    <label id="label-grade" class="label-text">Grade</label>
                    <input type="text" id="student-grade" placeholder="e.g. Kindy, Year 2...">
                </div>
            </div>
        </section>

        <!-- 2. Absence Class -->
        <section>
            <h2 id="head-cancel" class="section-title">Class to Absent</h2>
            <div class="space-y-8 mt-4">
                <div>
                    <label id="label-cancel-date" class="label-text">Select Date of Absence</label>
                    <input type="date" id="cancel-date" onchange="updateCancelTimeSlots()">
                </div>
                <div id="cancel-time-area" class="hidden">
                    <label id="label-cancel-time" class="label-text">Select Original Class Time</label>
                    <div id="cancel-time-slots" class="mt-4"></div>
                </div>
            </div>
        </section>

        <!-- 3. Makeup Request -->
        <section id="makeup-section" class="hidden border-t border-gray-100 pt-16">
            <h2 id="head-makeup" class="section-title">Requested Makeup</h2>
            <div class="space-y-10 mt-6">
                <button id="btn-decide-later" onclick="decideLater()" class="w-full border border-black py-4 text-[10px] uppercase tracking-widest font-bold hover:bg-gray-50">I'll decide the date later</button>
                
                <div id="decide-now-area" class="space-y-8">
                    <div class="text-center py-2 text-[10px] text-gray-300 italic tracking-widest">—— OR ——</div>
                    <div>
                        <label id="label-makeup-date" class="label-text">Select Preferred Date</label>
                        <input type="date" id="makeup-date" onchange="updateMakeupTimeSlots()">
                    </div>
                    <div id="makeup-time-area" class="hidden">
                        <label id="label-makeup-time" class="label-text">Available Makeup Slots</label>
                        <div id="makeup-time-slots" class="mt-4"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 4. Final Section -->
        <section id="final-section" class="hidden pt-12 border-t border-gray-100">
            <button id="btn-submit-main" onclick="showFinalNotice()" class="w-full bg-black text-white py-5 text-[10px] uppercase tracking-[0.25em] shadow-lg">
                Submit Request
            </button>
        </section>
    </div>
</div>

<!-- Modal -->
<div id="modal" class="modal-bg hidden">
    <div class="max-w-xs w-full bg-white p-10 shadow-2xl text-center border border-gray-50">
        <p id="modal-msg" class="text-xs text-gray-600 leading-relaxed mb-10"></p>
        <button id="modal-close-btn" onclick="closeModal()" class="text-[10px] font-bold border-b border-black pb-1 uppercase tracking-widest">Close</button>
    </div>
</div>

<script>
    const translations = {
        en: {
            subTitle: "Makeup Lesson Request",
            headCancel: "Class to Absent",
            labelName: "Student Name",
            labelGrade: "Grade",
            labelCancelDate: "Date of Absence",
            labelCancelTime: "Original Class Time",
            headMakeup: "Requested Makeup Slot",
            labelMakeupDate: "Preferred Makeup Date",
            labelMakeupTime: "Available Slots",
            btnLater: "I'll decide the date later",
