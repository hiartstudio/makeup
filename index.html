<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi Art Studio | Makeup Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; -webkit-font-smoothing: antialiased; }
        .studio-logo { font-family: 'Bodoni Moda', serif; font-size: 2.2rem; letter-spacing: -0.05em; }
        .hidden { display: none !important; }
        .modal-bg { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); position: fixed; top:0; left:0; width:100%; height:100%; z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 30px; }
        input { border-radius: 0 !important; border-bottom: 1px solid #e5e5e5 !important; background: transparent; transition: border-color 0.3s; width: 100%; padding: 12px 0; font-size: 14px; color: #1a1a1a; }
        input::placeholder { color: #ccc; font-style: italic; }
        input:focus { border-bottom: 1px solid #1a1a1a !important; outline: none; }
        .btn-select { border: 1px solid #f0f0f0; padding: 15px; font-size: 12px; text-align: left; cursor: pointer; transition: 0.2s; margin-bottom: 8px; display: block; width: 100%; }
        .btn-select.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
        .section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; tracking: 0.2em; border-bottom: 1px solid #1a1a1a; display: inline-block; margin-bottom: 24px; }
        .label-text { font-size: 10px; text-transform: uppercase; color: #aaa; letter-spacing: 0.1em; margin-bottom: 6px; display: block; }
        .warning-box { background-color: #fff9f9; border: 1px solid #ffebeb; padding: 15px; font-size: 11px; color: #d00; line-height: 1.6; margin-top: 10px; }
    </style>
</head>
<body class="pb-32">

<div id="app" class="max-w-md mx-auto px-8 py-12">
    <!-- Language Selection -->
    <div class="flex justify-end gap-5 mb-16 text-[10px] tracking-widest text-gray-400 font-medium">
        <button onclick="changeLang('en')" class="hover:text-black">EN</button>
        <button onclick="changeLang('ko')" class="hover:text-black">KR</button>
        <button onclick="changeLang('zh')" class="hover:text-black">CH</button>
    </div>

    <header class="text-center mb-20">
        <h1 class="studio-logo text-gray-900">Hi Art Studio</h1>
        <p id="sub-title" class="text-[9px] uppercase tracking-[0.4em] text-gray-400 mt-2 italic font-light">Makeup Lesson Request</p>
    </header>

    <div class="space-y-20">
        <!-- 1. Student Info -->
        <section>
            <div class="space-y-10">
                <div>
                    <label id="label-name" class="label-text">Student Name</label>
                    <input type="text" id="student-name" placeholder="e.g. Lan Kim">
                </div>
                <div>
                    <label id="label-grade" class="label-text">Grade</label>
                    <input type="text" id="student-grade" placeholder="e.g. Kindy, Year 2, Grade 6...">
                </div>
            </div>
        </section>

        <!-- 2. Absence Class -->
        <section>
            <h2 id="head-cancel" class="section-title">Class to Absent</h2>
            <div class="space-y-8 mt-4">
                <div>
                    <label id="label-cancel-date" class="label-text">Select Date of Absence</label>
                    <input type="date" id="cancel-date" onchange="updateCancelTimeSlots()">
                </div>
                <div id="cancel-time-area" class="hidden">
                    <label id="label-cancel-time" class="label-text">Select Original Class Time</label>
                    <div id="cancel-time-slots" class="mt-4"></div>
                </div>
            </div>
        </section>

        <!-- 3. Makeup Request -->
        <section id="makeup-section" class="hidden border-t border-gray-100 pt-16">
            <h2 id="head-makeup" class="section-title">Requested Makeup</h2>
            <div class="space-y-10 mt-6">
                <div class="flex flex-col gap-3">
                    <button id="btn-decide-later" onclick="decideLater()" class="w-full border border-black py-4 text-[10px] uppercase tracking-widest font-bold hover:bg-gray-50">I'll decide the date later</button>
                </div>
                
                <div id="decide-now-area" class="space-y-8">
                    <div class="text-center py-2 text-[10px] text-gray-300">—— OR PICK A DATE ——</div>
                    <div>
                        <label id="label-makeup-date" class="label-text">Select Preferred Date</label>
                        <input type="date" id="makeup-date" onchange="updateMakeupTimeSlots()">
                    </div>
                    <div id="makeup-time-area" class="hidden">
                        <label id="label-makeup-time" class="label-text">Available Makeup Slots</label>
                        <div id="makeup-time-slots" class="mt-4"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Final Confirm Section -->
        <section id="final-section" class="hidden pt-12 border-t border-gray-100">
            <button onclick="showFinalNotice()" class="w-full bg-black text-white py-5 text-[10px] uppercase tracking-[0.25em] shadow-lg">
                Submit Request
            </button>
        </section>
    </div>
</div>

<!-- Warning/Notice Modals -->
<div id="modal" class="modal-bg hidden">
    <div class="max-w-xs w-full bg-white p-10 shadow-2xl text-center">
        <p id="modal-msg" class="text-xs text-gray-600 leading-relaxed mb-10"></p>
        <button id="modal-close-btn" onclick="closeModal()" class="text-[10px] font-bold border-b border-black pb-1 uppercase tracking-widest">Close</button>
    </div>
</div>

<script>
    const translations = {
        en: {
            subTitle: "Makeup Lesson Request",
            headCancel: "Class to Absent",
            labelName: "Student Name",
            labelGrade: "Grade",
            labelCancelDate: "Date of Absence",
            labelCancelTime: "Original Class Time",
            headMakeup: "Requested Makeup Slot",
            labelMakeupDate: "Preferred Makeup Date",
            labelMakeupTime: "Available Slots",
            btnLater: "I'll decide the date later",
            policyBlock: "All classes must be changed or canceled at least 24 hours in advance. Since there was not enough time to invite other students to the vacancy, makeup classes are not guaranteed. (Request Denied)",
            laterNotice: "Please note: Reminding yourself to book the makeup lesson is your responsibility. When you book later, you must provide the date and time of the original absent class.",
            finalNotice: "This is only a request. Head Teacher Lan Kim will send a confirmation SMS. If requested 24h+ in advance, your cancellation is processed, but checking for available makeup slots may take some time.",
            satMsg: "Makeup classes are only available on weekdays. For special requests, please contact Head Teacher Lan Kim directly.",
            btnSubmit: "Submit Request"
        },
        ko: {
            subTitle: "보충 수업 신청",
            headCancel: "결석 예정 수업",
            labelName: "학생 성함",
            labelGrade: "학년",
            labelCancelDate: "결석 날짜",
            labelCancelTime: "기존 수업 시간",
            headMakeup: "보충 신청 수업",
            labelMakeupDate: "보충 희망 날짜",
            labelMakeupTime: "선택 가능한 시간",
            btnLater: "보충 날짜는 나중에 결정하겠습니다",
            policyBlock: "모든 수업은 최소 24시간 전에 변경 혹은 캔슬이 가능합니다. 빈 자리에 다른 학생을 초대할 만한 충분한 시간이 주어지지 않았기 때문에, 보충수업 신청이 거절될 수 있습니다.",
            laterNotice: "주의: 보충 수업을 나중에 예약하는 것에 대한 리마인드 책임은 본인에게 있습니다. 추후 예약 시 취소했던 수업의 날짜와 시간을 반드시 알려주셔야 합니다.",
            finalNotice: "안내: 이것은 단지 보충수업 요청일 뿐이며, 헤드티쳐 Lan Kim이 확인 후 컨펌 문자를 보내드릴 예정입니다. 24시간 전 요청이라면 수업 취소는 처리되나, 보충 수업 가능 여부 확인에는 시간이 걸릴 수 있습니다.",
            satMsg: "보충수업은 평일에만 가능합니다. 방학 기간 등 특이 사항은 헤드티쳐 Lan Kim에게 직접 문의하십시오.",
            btnSubmit: "신청서 제출"
        }
    };

    const scheduleData = [
        { day: 'Mon', time: '05:20 - 06:20', dur: 1 }, { day: 'Tue', time: '03:20 - 04:20', dur: 1 }, { day: 'Tue', time: '04:30 - 05:30', dur: 1 }, { day: 'Wed', time: '03:50 - 04:50', dur: 1 }, { day: 'Thu', time: '04:00 - 05:00', dur: 1 }, { day: 'Fri', time: '03:50 - 04:50', dur: 1 },
        { day: 'Mon', time: '03:40 - 05:10', dur: 1.5 }, { day: 'Tue', time: '05:50 - 07:20', dur: 1.5 }, { day: 'Wed', time: '03:40 - 05:10', dur: 1.5 }, { day: 'Thu', time: '04:00 - 05:30', dur: 1.5 }, { day: 'Fri', time: '03:40 - 05:10', dur: 1.5 },
        { day: 'Mon', time: '04:00 - 06:00', dur: 2 }, { day: 'Tue', time: '03:40 - 05:40', dur: 2 }, { day: 'Wed', time: '05:20 - 07:20', dur: 2 }, { day: 'Thu', time: '05:40 - 07:40', dur: 2 }, { day: 'Fri', time: '05:20 - 07:20', dur: 2 }
    ];

    let currentLang = 'en';
    let selectedDur = 0;
    let cancelInfo = "";
    let makeupInfo = "Decide Later";

    function changeLang(lang) {
        currentLang = lang;
        const t = translations[lang];
        document.getElementById('sub-title').innerText = t.subTitle;
        document.getElementById('head-cancel').innerText = t.headCancel;
        document.getElementById('label-name').innerText = t.labelName;
        document.getElementById('label-grade').innerText = t.labelGrade;
        document.getElementById('label-cancel-date').innerText = t.labelCancelDate;
        document.getElementById('label-cancel-time').innerText = t.labelCancelTime;
        document.getElementById('head-makeup').innerText = t.headMakeup;
        document.getElementById('label-makeup-date').innerText = t.labelMakeupDate;
        document.getElementById('label-makeup-time').innerText = t.labelMakeupTime;
        document.getElementById('btn-decide-later').innerText = t.btnLater;
        document.getElementById('student-name').placeholder = lang === 'ko' ? "예: Lan Kim" : "e.g. Lan Kim";
        document.getElementById('student-grade').placeholder = lang === 'ko' ? "예: Kindy, Year 2..." : "e.g. Year 2...";
    }

    function updateCancelTimeSlots() {
        const val = document.getElementById('cancel-date').value;
        const dateParts = val.split('-');
        const dateObj = new Date(dateParts[0], dateParts[1]-1, dateParts[2]);
        const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dateObj.getDay()];
        const container = document.getElementById('cancel-time-slots');
        container.innerHTML = "";
        
        scheduleData.filter(s => s.day === dayName).forEach(slot => {
            const btn = document.createElement('button');
            btn.className = "btn-select";
            btn.innerText = `${slot.time} (${slot.dur}h)`;
            btn.onclick = () => {
                // 24시간 체크
                const [startHour, startMin] = slot.time.split(' - ')[0].split(':');
                const classTime = new Date(dateParts[0], dateParts[1]-1, dateParts[2], startHour, startMin);
                const now = new Date();
                
                if ((classTime - now) < (24 * 60 * 60 * 1000)) {
                    showModal(translations[currentLang].policyBlock);
                    document.getElementById('makeup-section').classList.add('hidden');
                    return;
                }

                selectedDur = slot.dur;
                cancelInfo = `${val} (${dayName}) ${slot.time}`;
                document.querySelectorAll('#cancel-time-slots .btn-select').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('makeup-section').classList.remove('hidden');
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            };
            container.appendChild(btn);
        });
        document.getElementById('cancel-time-area').classList.remove('hidden');
    }

    function updateMakeupTimeSlots() {
        const val = document.getElementById('makeup-date').value;
        const dateParts = val.split('-');
        const dateObj = new Date(dateParts[0], dateParts[1]-1, dateParts[2]);
        const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dateObj.getDay()];

        if(dayName === 'Sat') {
            showModal(translations[currentLang].satMsg);
            document.getElementById('makeup-date').value = "";
            return;
        }

        const container = document.getElementById('makeup-time-slots');
        container.innerHTML = "";
        const slots = scheduleData.filter(s => s.day === dayName && s.dur === selectedDur);
        
        if(slots.length > 0) {
            document.getElementById('makeup-time-area').classList.remove('hidden');
            slots.forEach(slot => {
                const b = document.createElement('button');
                b.className = "btn-select";
                b.innerText = slot.time;
                b.onclick = () => {
                    makeupInfo = `${val} (${dayName}) ${slot.time}`;
                    document.querySelectorAll('#makeup-time-slots .btn-select').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    document.getElementById('final-section').classList.remove('hidden');
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                };
                container.appendChild(b);
            });
        } else {
            container.innerHTML = "<p class='text-[10px] text-gray-400'>No matching classes this day.</p>";
        }
    }

    function decideLater() {
        makeupInfo = currentLang === 'ko' ? "나중에 결정 (추후 연락 예정)" : "Decide Later (Will contact later)";
        showModal(translations[currentLang].laterNotice);
        document.getElementById('makeup-time-area').classList.add('hidden');
        document.getElementById('final-section').classList.remove('hidden');
    }

    function showFinalNotice() {
        const modal = document.getElementById('modal');
        const msg = document.getElementById('modal-msg');
        const btn = document.getElementById('modal-close-btn');
        
        msg.innerText = translations[currentLang].finalNotice;
        btn.innerText = currentLang === 'ko' ? "내용 확인 및 문자 보내기" : "I understand. Open SMS";
        btn.onclick = sendFinalSMS;
        modal.classList.remove('hidden');
    }

    function sendFinalSMS() {
        const name = document.getElementById('student-name').value;
        const grade = document.getElementById('student-grade').value;
        if(!name) { alert("Please enter student name."); return; }

        const msg = `[Hi Art Studio Request]\nStudent: ${name}\nGrade: ${grade}\n- Absent: ${cancelInfo}\n- Makeup: ${makeupInfo}`;
        const smsUrl = `sms:0405068004?body=${encodeURIComponent(msg)}`;
        window.location.href = smsUrl;
        closeModal();
    }

    function showModal(text) {
        document.getElementById('modal-msg').innerText = text;
        document.getElementById('modal-close-btn').innerText = "Close";
        document.getElementById('modal-close-btn').onclick = closeModal;
        document.getElementById('modal').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    changeLang('en');
</script>
</body>
</html>
