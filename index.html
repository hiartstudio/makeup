<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi Art Studio | Makeup Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; -webkit-font-smoothing: antialiased; }
        .studio-logo { font-family: 'Bodoni Moda', serif; font-size: 2.2rem; letter-spacing: -0.05em; }
        .hidden { display: none !important; }
        .modal-bg { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); position: fixed; top:0; left:0; width:100%; height:100%; z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        input { border-radius: 0 !important; border-bottom: 1px solid #e5e5e5 !important; background: transparent; transition: border-color 0.3s; width: 100%; padding: 10px 0; font-size: 14px; color: #1a1a1a; }
        input::placeholder { color: #ccc; font-style: italic; font-size: 13px; }
        input:focus { border-bottom: 1px solid #1a1a1a !important; outline: none; }
        .btn-select { border: 1px solid #f0f0f0; padding: 14px; font-size: 12px; text-align: left; cursor: pointer; transition: 0.2s; margin-bottom: 6px; display: block; width: 100%; }
        .btn-select.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
        .day-btn { border: 1px solid #f0f0f0; padding: 12px 0; text-align: center; font-size: 11px; }
        .day-btn.active { background: #1a1a1a; color: white; }
        .section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; tracking: 0.2em; border-bottom: 1px solid #1a1a1a; display: inline-block; margin-bottom: 24px; }
        .label-text { font-size: 10px; text-transform: uppercase; color: #aaa; letter-spacing: 0.1em; margin-bottom: 4px; display: block; }
    </style>
</head>
<body class="pb-24">

<div id="app" class="max-w-md mx-auto px-8 py-12">
    <!-- Language Selection -->
    <div class="flex justify-end gap-5 mb-16 text-[10px] tracking-widest text-gray-400 font-medium">
        <button onclick="changeLang('en')" class="hover:text-black">EN</button>
        <button onclick="changeLang('ko')" class="hover:text-black">KR</button>
        <button onclick="changeLang('zh')" class="hover:text-black">CH</button>
    </div>

    <header class="text-center mb-20">
        <h1 class="studio-logo text-gray-900">Hi Art Studio</h1>
        <p id="sub-title" class="text-[9px] uppercase tracking-[0.4em] text-gray-400 mt-2 italic font-light">Makeup Lesson Request</p>
    </header>

    <div class="space-y-20">
        <!-- 1. Student Info -->
        <section>
            <div class="space-y-10">
                <div>
                    <label id="label-name" class="label-text">Student Name</label>
                    <input type="text" id="student-name" placeholder="e.g. Lan Kim">
                </div>
                <div>
                    <label id="label-grade" class="label-text">Grade</label>
                    <input type="text" id="student-grade" placeholder="e.g. Kindy, Year 2, Grade 6...">
                </div>
            </div>
        </section>

        <!-- 2. Absence Class -->
        <section>
            <h2 id="head-cancel" class="section-title">Class to Absent</h2>
            <div class="space-y-8 mt-4">
                <div>
                    <label id="label-cancel-date" class="label-text">Select Date of Absence</label>
                    <input type="date" id="cancel-date" onchange="updateCancelTimeSlots()">
                </div>
                <div id="cancel-time-area" class="hidden">
                    <label id="label-cancel-time" class="label-text">Select Original Class Time</label>
                    <div id="cancel-time-slots" class="mt-4"></div>
                </div>
            </div>
        </section>

        <!-- 3. Makeup Request -->
        <section id="makeup-section" class="hidden border-t border-gray-100 pt-16">
            <h2 id="head-makeup" class="section-title">Requested Makeup</h2>
            <div class="space-y-10 mt-6">
                <div>
                    <label id="label-makeup-day" class="label-text">Select Preferred Weekday</label>
                    <div class="grid grid-cols-5 gap-2 mt-4">
                        <button onclick="selectMakeupDay('Mon', this)" class="day-btn">MON</button>
                        <button onclick="selectMakeupDay('Tue', this)" class="day-btn">TUE</button>
                        <button onclick="selectMakeupDay('Wed', this)" class="day-btn">WED</button>
                        <button onclick="selectMakeupDay('Thu', this)" class="day-btn">THU</button>
                        <button onclick="selectMakeupDay('Fri', this)" class="day-btn">FRI</button>
                    </div>
                    <button onclick="showSatWarning()" class="w-full mt-3 text-[9px] text-gray-300 py-3 border border-dashed border-gray-100">Requesting Saturday?</button>
                </div>

                <div id="makeup-time-area" class="hidden">
                    <label id="label-makeup-time" class="label-text">Available Makeup Slots</label>
                    <div id="makeup-time-slots" class="mt-4"></div>
                </div>
            </div>
        </section>

        <!-- 4. Final Action -->
        <section id="final-section" class="hidden pt-12">
            <div class="mb-10 text-center">
                <p id="policy-text" class="text-[10px] text-gray-400 italic leading-relaxed"></p>
            </div>
            <button onclick="checkPolicyAndSend()" class="w-full bg-black text-white py-5 text-[10px] uppercase tracking-[0.25em] hover:opacity-80 transition-all shadow-lg">
                Confirm & Open Message
            </button>
        </section>
    </div>
</div>

<!-- Warning Modal -->
<div id="modal" class="modal-bg hidden">
    <div class="max-w-xs w-full text-center bg-white p-10 shadow-2xl border border-gray-50">
        <p id="modal-msg" class="text-xs text-gray-600 leading-relaxed mb-10 font-light"></p>
        <button onclick="closeModal()" class="text-[10px] font-bold border-b border-black pb-1 uppercase tracking-widest">Close</button>
    </div>
</div>

<script>
    const translations = {
        en: {
            subTitle: "Makeup Lesson Request",
            headCancel: "Class to Absent",
            labelName: "Student Name",
            labelGrade: "Grade",
            labelCancelDate: "Date of Absence",
            labelCancelTime: "Original Class Time",
            headMakeup: "Requested Makeup Slot",
            labelMakeupDay: "Select Day (Weekdays)",
            labelMakeupTime: "Available Slots",
            policy: "All classes must be changed or canceled at least 24 hours in advance. Since there was not enough time to invite other students to the vacancy, makeup classes are not guaranteed.",
            satMsg: "Makeup classes are only available on weekdays. If weekday makeup is difficult, including during vacation periods, please contact Head Teacher Lan Kim directly for a special request.",
            btnSubmit: "Confirm & Open SMS"
        },
        ko: {
            subTitle: "보충 수업 신청",
            headCancel: "결석 예정 수업",
            labelName: "학생 성함",
            labelGrade: "학년",
            labelCancelDate: "결석 날짜",
            labelCancelTime: "기존 수업 시간",
            headMakeup: "보충 신청 수업",
            labelMakeupDay: "보충 희망 요일 (평일)",
            labelMakeupTime: "선택 가능한 시간",
            policy: "모든 수업은 최소 24시간 전에 변경 혹은 캔슬이 가능합니다. 빈 자리에 다른 학생을 초대할 만한 충분한 시간이 주어지지 않았기 때문에, 보충수업은 보장되지 않습니다.",
            satMsg: "보충수업은 평일에만 가능합니다. 방학기간을 포함해서 평일 보충이 어려울때에는 스패셜 리퀘스트를 헤드티쳐 Lan Kim에게 직접 문의하십시오.",
            btnSubmit: "신청 완료 및 문자 전송"
        },
        zh: {
            subTitle: "申请补课",
            headCancel: "缺席课程",
            labelName: "学生姓名",
            labelGrade: "年级",
            labelCancelDate: "缺席日期",
            labelCancelTime: "原定课程时间",
            headMakeup: "申请补课时间",
            labelMakeupDay: "选择日期 (仅限工作日)",
            labelMakeupTime: "可用时间段",
            policy: "所有课程必须至少提前 24 小时更改或取消。由于没有足够的时间邀请其他学生填补空缺，因此无法保证补课。",
            satMsg: "补课仅限在工作日。如在假期期间无法安排工作日补课，请直接联系 Lan Kim 主任进行特别申请。",
            btnSubmit: "确认并发送申请"
        }
    };

    const scheduleData = [
        // 1 Hour
        { day: 'Mon', time: '05:20 - 06:20', dur: 1 },
        { day: 'Tue', time: '03:20 - 04:20', dur: 1 }, { day: 'Tue', time: '04:30 - 05:30', dur: 1 },
        { day: 'Wed', time: '03:50 - 04:50', dur: 1 },
        { day: 'Thu', time: '04:00 - 05:00', dur: 1 },
        { day: 'Fri', time: '03:50 - 04:50', dur: 1 },
        // 1.5 Hours
        { day: 'Mon', time: '03:40 - 05:10', dur: 1.5 },
        { day: 'Tue', time: '05:50 - 07:20', dur: 1.5 },
        { day: 'Wed', time: '03:40 - 05:10', dur: 1.5 },
        { day: 'Thu', time: '04:00 - 05:30', dur: 1.5 },
        { day: 'Fri', time: '03:40 - 05:10', dur: 1.5 },
        // 2 Hours
        { day: 'Mon', time: '04:00 - 06:00', dur: 2 },
        { day: 'Tue', time: '03:40 - 05:40', dur: 2 },
        { day: 'Wed', time: '05:20 - 07:20', dur: 2 },
        { day: 'Thu', time: '05:40 - 07:40', dur: 2 },
        { day: 'Fri', time: '05:20 - 07:20', dur: 2 }
    ];

    let currentLang = 'en';
    let selectedDur = 0;
    let cancelInfo = "";
    let makeupInfo = "";

    function changeLang(lang) {
        currentLang = lang;
        const t = translations[lang];
        document.getElementById('sub-title').innerText = t.subTitle;
        document.getElementById('head-cancel').innerText = t.headCancel;
        document.getElementById('label-name').innerText = t.labelName;
        document.getElementById('label-grade').innerText = t.labelGrade;
        document.getElementById('label-cancel-date').innerText = t.labelCancelDate;
        document.getElementById('label-cancel-time').innerText = t.labelCancelTime;
        document.getElementById('head-makeup').innerText = t.headMakeup;
        document.getElementById('label-makeup-day').innerText = t.labelMakeupDay;
        document.getElementById('label-makeup-time').innerText = t.labelMakeupTime;
        document.getElementById('policy-text').innerText = t.policy;
        document.getElementById('student-name').placeholder = lang === 'ko' ? "예: 김란" : (lang === 'zh' ? "例如: Lan Kim" : "e.g. Lan Kim");
        document.getElementById('student-grade').placeholder = lang === 'ko' ? "예: Kindy, Year 2, Grade 6..." : (lang === 'zh' ? "例如: Kindy, Year 2..." : "e.g. Kindy, Year 2, Grade 6...");
    }

    function updateCancelTimeSlots() {
        const val = document.getElementById('cancel-date').value;
        if(!val) return;
        
        const dateParts = val.split('-');
        const dateObj = new Date(dateParts[0], dateParts[1]-1, dateParts[2]);
        const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dateObj.getDay()];
        
        const container = document.getElementById('cancel-time-slots');
        container.innerHTML = "";
        
        const slots = scheduleData.filter(s => s.day === dayName);
        
        if(slots.length > 0) {
            document.getElementById('cancel-time-area').classList.remove('hidden');
            slots.forEach(slot => {
                const btn = document.createElement('button');
                btn.className = "btn-select";
                btn.innerText = `${slot.time} (${slot.dur}h)`;
                btn.onclick = () => {
                    selectedDur = slot.dur;
                    cancelInfo = `${val} (${dayName}) ${slot.time}`;
                    document.querySelectorAll('#cancel-time-slots .btn-select').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('makeup-section').classList.remove('hidden');
                };
                container.appendChild(btn);
            });
        } else {
            alert("No regular classes on this day.");
            document.getElementById('cancel-time-area').classList.add('hidden');
        }
    }

    function selectMakeupDay(day, btn) {
        document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const container = document.getElementById('makeup-time-slots');
        container.innerHTML = "";
        
        const slots = scheduleData.filter(s => s.day === day && s.dur === selectedDur);
        
        if(slots.length > 0) {
            document.getElementById('makeup-time-area').classList.remove('hidden');
            slots.forEach(slot => {
                const b = document.createElement('button');
                b.className = "btn-select";
                b.innerText = slot.time;
                b.onclick = () => {
                    makeupInfo = `${day} ${slot.time}`;
                    document.querySelectorAll('#makeup-time-slots .btn-select').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    document.getElementById('final-section').classList.remove('hidden');
                };
                container.appendChild(b);
            });
        } else {
            container.innerHTML = "<p class='text-[10px] text-gray-400'>No matching duration slots this day.</p>";
        }
    }

    function checkPolicyAndSend() {
        const dateVal = document.getElementById('cancel-date').value;
        const dateParts = dateVal.split('-');
        const cancelDate = new Date(dateParts[0], dateParts[1]-1, dateParts[2]);
        const now = new Date();
        const diffHours = (cancelDate - now) / (1000 * 60 * 60);

        if (diffHours < 24) {
            alert(translations[currentLang].policy);
        }
        
        const name = document.getElementById('student-name').value;
        const grade = document.getElementById('student-grade').value;
        if(!name) { alert("Please enter student name."); return; }

        const msg = `[Hi Art Studio Request]\nStudent: ${name}\nGrade: ${grade}\n- Absent: ${cancelInfo}\n- Makeup: ${makeupInfo}`;
        const smsUrl = `sms:0405068004?body=${encodeURIComponent(msg)}`;
        window.location.href = smsUrl;
    }

    function showSatWarning() { 
        document.getElementById('modal-msg').innerText = translations[currentLang].satMsg;
        document.getElementById('modal').classList.remove('hidden'); 
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    changeLang('en');
</script>
</body>
</html>
